<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasha Nishid — Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --paper:     #F4EFE6;
            --paper-mid: #EDE7DB;
            --ink:       #111111;
            --ink-mid:   #555;
            --ink-dim:   #999;
            --blue:      #49A8DC;
            --blue-hi:   #6FC0EA;
            --blue-lo:   #2980B9;
            --grid:      rgba(0,0,0,0.055);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }

        body {
            background-color: var(--paper);
            background-image:
                linear-gradient(var(--grid) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid) 1px, transparent 1px);
            background-size: 28px 28px;
            font-family: -apple-system, 'Helvetica Neue', sans-serif;
            color: var(--ink);
            height: 100vh;
            width: 100vw;
            position: relative;
            user-select: none;
        }

        /* ---- MENUBAR ---- */
        .menubar {
            position: fixed; top: 0; left: 0; right: 0;
            height: 26px;
            background: rgba(242,237,226,0.88);
            backdrop-filter: blur(14px) saturate(160%);
            -webkit-backdrop-filter: blur(14px) saturate(160%);
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 14px; z-index: 200;
            font-size: 12.5px; font-weight: 500; color: #444;
            user-select: none;
        }
        .mb-l { display: flex; gap: 16px; align-items: center; }
        .mb-r { display: flex; gap: 10px; align-items: center; font-size: 12px; color: #888; }

        /* ---- HERO NAME ---- */
        .hero {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.05s both;
        }

        /* Big bold black type like "What is iOS Core?" */
        .hero-name {
            font-size: clamp(72px, 11vw, 136px);
            font-weight: 900;
            letter-spacing: -4px;
            line-height: 0.88;
            color: var(--ink);
            font-family: -apple-system, 'Helvetica Neue', 'Arial Black', sans-serif;
            margin-bottom: 18px;
        }
        /* The second word gets the blue highlight treatment like "iOS" in the inspo */
        .hero-name .accent {
            color: var(--blue);
            display: inline-block;
            position: relative;
        }
        /* Subtle underline box behind accent like the iOS bracket */
        .hero-name .accent::after {
            content: '';
            position: absolute;
            bottom: 4px; left: -3px; right: -3px;
            height: 6px;
            background: rgba(73,168,220,0.18);
            border-radius: 2px;
        }

        .hero-sub {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--ink-dim);
            letter-spacing: 0.04em;
            line-height: 1.8;
        }

        /* ---- DESKTOP ICONS — real macOS folder look ---- */
        .icon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            width: 90px;
            animation: iconIn 0.4s cubic-bezier(0.22,1,0.36,1) both;
        }
        .icon:hover svg { filter: brightness(1.1) saturate(1.1); transform: translateY(-3px); }
        .icon:active svg { filter: brightness(0.92); transform: scale(0.95); }
        .icon svg { transition: filter 0.12s, transform 0.12s; }

        .icon-lbl {
            font-size: 12px;
            font-weight: 500;
            color: var(--ink);
            text-align: center;
            text-shadow: 0 1px 0 rgba(255,255,255,0.9), 0 -1px 0 rgba(255,255,255,0.9);
            line-height: 1.3;
            white-space: nowrap;
        }

        /* RIGHT COLUMN */
        #ic-projects   { top: 10%;  right: 3%; animation-delay: 0.18s; }
        #ic-about      { top: 28%;  right: 3%; animation-delay: 0.24s; }
        #ic-skills     { top: 46%;  right: 3%; animation-delay: 0.30s; }
        #ic-coursework { top: 64%;  right: 3%; animation-delay: 0.36s; }
        /* LEFT COLUMN */
        #ic-contact    { top: 10%;  left: 3%;  animation-delay: 0.20s; }
        #ic-resume     { top: 28%;  left: 3%;  animation-delay: 0.28s; }

        /* ---- DOCK ---- */
        .dock {
            position: fixed;
            bottom: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(255,252,245,0.75);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(0,0,0,0.13);
            border-radius: 20px;
            padding: 7px 14px;
            display: flex; gap: 6px; align-items: flex-end;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06);
            animation: dockIn 0.55s cubic-bezier(0.22,1,0.36,1) 0.4s both;
        }
        .dock-item {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; position: relative;
            transition: transform 0.12s ease;
        }
        .dock-item:hover { transform: translateY(-8px) scale(1.14); }
        .dock-item:active { transform: translateY(-3px) scale(1.04); }
        .dock-item svg { display: block; }
        .dock-tip {
            position: absolute; bottom: 64px;
            background: rgba(20,20,20,0.82);
            color: #fff; font-size: 11px; padding: 3px 8px;
            border-radius: 6px; white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity 0.1s;
        }
        .dock-item:hover .dock-tip { opacity: 1; }
        .dock-dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(0,0,0,0.4); }

        /* ANIMATIONS */
        @keyframes fadeUp {
            from { opacity: 0; transform: translate(-50%, calc(-50% + 16px)); }
            to   { opacity: 1; transform: translate(-50%, -50%); }
        }
        @keyframes iconIn {
            from { opacity: 0; transform: scale(0.7) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes dockIn {
            from { opacity: 0; transform: translateX(-50%) translateY(18px); }
            to   { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>

    <script>
        function tick() {
            const now = new Date();
            let h = now.getHours(), m = now.getMinutes();
            const ap = h >= 12 ? 'PM' : 'AM';
            h = h % 12 || 12; m = String(m).padStart(2,'0');
            document.getElementById('clock').textContent = `${h}:${m} ${ap}`;
        }
        tick(); setInterval(tick, 1000);
    </script>
